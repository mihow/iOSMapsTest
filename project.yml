name: iOSMapsTest
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"

targets:
  iOSMapsTest:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Resources/test-annotations.json
          - Resources/test-polygon.geojson
          - Resources/leaflet.html
          - Resources/osm-raster-style.json
      - path: Sources/Resources/test-annotations.json
        type: file
        buildPhase: resources
      - path: Sources/Resources/test-polygon.geojson
        type: file
        buildPhase: resources
      - path: Sources/Resources/leaflet.html
        type: file
        buildPhase: resources
      - path: Sources/Resources/osm-raster-style.json
        type: file
        buildPhase: resources
    dependencies:
      - framework: MapLibre.xcframework
        embed: true
    postBuildScripts:
      - script: |
          cp -r "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Frameworks/MapLibre.framework/Mapbox.bundle" \
                "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/"
        name: Copy Mapbox.bundle to app root
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.iOSMapsTest
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      SWIFT_VERSION: "5.0"
      OTHER_LDFLAGS: "-ObjC"
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      PRODUCT_NAME: iOSMapsTest

  iOSMapsTestTests:
    type: bundle.unit-test
    platform: iOS
    sources: Tests/
    dependencies:
      - target: iOSMapsTest
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.iOSMapsTestTests
      SWIFT_VERSION: "5.0"
      PRODUCT_NAME: iOSMapsTestTests
